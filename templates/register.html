{% extends 'base.html' %}

{% block content %}
<div style="max-width: 500px; margin: auto;">
    <h2 style="text-align: center; margin-bottom: 30px; color: #2c3e50;">Create an Account</h2>
    
    <form method="POST" action="{{ url_for('register') }}">
        <form method="POST" action="{{ url_for('register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <label for="first_name">First Name:</label>
        <input type="text" id="first_name" name="first_name" required>

        <label for="last_name">Last Name:</label>
        <input type="text" id="last_name" name="last_name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required minlength="8">

        <div></div> 
        
        <button type="submit" style="width: 100%; max-width: 150px; justify-self: start;">Register</button>
    </form>
    
    <div style="text-align: center; margin-top: 25px; font-size: 0.9em;">
        <p>Already have an account? <a href="{{ url_for('login') }}" style="color: #3498db; text-decoration: none; font-weight: bold;">Login here</a></p>
    </div>
</div>
{% endblock %}
